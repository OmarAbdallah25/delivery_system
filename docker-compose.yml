version: '3.8'

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - delivery-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - delivery-net
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 10

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: order-service
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:29092
      ORDER_SERVICE_PORT: 50051
      PROTO_DIR: /app/proto
    ports:
      - "50051:50051"
    networks:
      - delivery-net
    restart: on-failure

  driver-service:
    build:
      context: .
      dockerfile: driver-service/Dockerfile
    container_name: driver-service
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:29092
      DRIVER_SERVICE_PORT: 50052
      PROTO_DIR: /app/proto
    ports:
      - "50052:50052"
    networks:
      - delivery-net
    restart: on-failure

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: notification-service
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:29092
      NOTIF_SERVICE_PORT: 50053
      PROTO_DIR: /app/proto
    ports:
      - "50053:50053"
    networks:
      - delivery-net
    restart: on-failure

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    depends_on:
      - order-service
      - driver-service
      - notification-service
    environment:
      PORT: 3000
      ORDER_SERVICE_ADDR: order-service:50051
      DRIVER_SERVICE_ADDR: driver-service:50052
      NOTIF_SERVICE_ADDR: notification-service:50053
      PROTO_DIR: /app/proto
    ports:
      - "3000:3000"
    networks:
      - delivery-net
    restart: on-failure

networks:
  delivery-net:
    driver: bridge