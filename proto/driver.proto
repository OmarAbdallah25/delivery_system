syntax = "proto3";

package driver;

service DriverService {
  rpc RegisterDriver      (RegisterDriverRequest)      returns (DriverResponse);
  rpc GetDriver           (GetDriverRequest)           returns (DriverResponse);
  rpc UpdateLocation      (UpdateLocationRequest)      returns (DriverResponse);
  rpc UpdateAvailability  (UpdateAvailabilityRequest)  returns (DriverResponse);
  rpc GetAvailableDrivers (Empty)                      returns (ListDriversResponse);
  rpc AssignDriver        (AssignDriverRequest)        returns (DriverResponse);
}

message RegisterDriverRequest {
  string name    = 1;
  string phone   = 2;
  string vehicle = 3;
}

message GetDriverRequest {
  string driver_id = 1;
}

message UpdateLocationRequest {
  string driver_id = 1;
  double latitude  = 2;
  double longitude = 3;
}

message UpdateAvailabilityRequest {
  string driver_id  = 1;
  bool   available  = 2;
}

message AssignDriverRequest {
  string driver_id = 1;
  string order_id  = 2;
}

message Empty {}

message DriverResponse {
  string driver_id        = 1;
  string name             = 2;
  string phone            = 3;
  string vehicle          = 4;
  bool   available        = 5;
  double latitude         = 6;
  double longitude        = 7;
  string current_order_id = 8;
  string created_at       = 9;
}

message ListDriversResponse {
  repeated DriverResponse drivers = 1;
}
