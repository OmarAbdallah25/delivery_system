syntax = "proto3";

package notification;

service NotificationService {
  rpc SendNotification  (SendNotificationRequest)  returns (NotificationResponse);
  rpc GetNotifications  (GetNotificationsRequest)  returns (ListNotificationsResponse);
}

message SendNotificationRequest {
  string recipient_id   = 1;
  string recipient_type = 2;
  string message        = 3;
  string order_id       = 4;
  string type           = 5;
}

message GetNotificationsRequest {
  string recipient_id = 1;
}

message NotificationResponse {
  string notification_id = 1;
  string recipient_id    = 2;
  string recipient_type  = 3;
  string message         = 4;
  string order_id        = 5;
  string type            = 6;
  string created_at      = 7;
}

message ListNotificationsResponse {
  repeated NotificationResponse notifications = 1;
}
